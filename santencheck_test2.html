<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>資材3点照合アプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Meiryo',sans-serif;background:#f0f4f8;min-height:100vh;padding:12px}
h1{font-size:18px;font-weight:600;color:#fff}
.subtitle{font-size:12px;color:rgba(255,255,255,0.85);margin-top:2px}
.topbar{background:#185FA5;padding:14px 16px 12px;border-radius:12px 12px 0 0}
.screen{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1);max-width:420px;margin:0 auto;overflow:hidden}
.sec{padding:14px 16px;border-bottom:1px solid #eee}
.sec-label{font-size:11px;color:#888;font-weight:600;letter-spacing:0.5px;margin-bottom:10px}
.step-badge{display:inline-block;background:#185FA5;color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;margin-right:6px}
select,input[type=text],input[type=number]{width:100%;font-size:15px;padding:10px 12px;border-radius:8px;border:1.5px solid #ddd;background:#fff;color:#222;-webkit-appearance:none;appearance:none}
select:focus,input:focus{outline:none;border-color:#185FA5}
.order-card{background:#f5f8ff;border-radius:8px;padding:12px;margin-top:10px;border:1px solid #dce8f8}
.orow{display:flex;justify-content:space-between;align-items:flex-start;padding:4px 0;border-bottom:1px solid #e8eef8}
.orow:last-child{border-bottom:none}
.ok{font-size:12px;color:#666;flex-shrink:0;margin-right:8px}
.ov{font-size:13px;font-weight:600;color:#222;text-align:right}
.qty-val{color:#185FA5;font-size:16px}
.input-block{margin-bottom:12px}
.input-lbl{font-size:13px;color:#555;margin-bottom:5px;font-weight:500}
.input-row{display:flex;gap:8px}
.input-row input{flex:1}
.check-btn{width:100%;padding:14px;background:#185FA5;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:4px;letter-spacing:0.5px;-webkit-appearance:none}
.check-btn:active{background:#0d4a82}
.rcard{border-radius:8px;padding:11px 13px;margin-bottom:8px;border:1.5px solid}
.rok{background:#f0faf0;border-color:#4caf50}
.rng{background:#fff5f5;border-color:#e53935}
.rtitle{font-size:14px;font-weight:600;margin-bottom:3px}
.rtitle.ok{color:#2e7d32}
.rtitle.ng{color:#c62828}
.rdetail{font-size:12px;color:#666}
.final-ok{background:#e8f5e9;border-radius:10px;padding:16px;text-align:center;border:2px solid #4caf50;margin-top:4px}
.final-ng{background:#ffebee;border-radius:10px;padding:16px;text-align:center;border:2px solid #e53935;margin-top:4px}
.ft-ok{color:#2e7d32;font-size:18px;font-weight:700;margin-top:6px}
.ft-ng{color:#c62828;font-size:18px;font-weight:700;margin-top:6px}
.fs-ok{color:#388e3c;font-size:13px;margin-top:4px}
.fs-ng{color:#c62828;font-size:13px;margin-top:4px}
.icon-big{font-size:32px}
.reset-btn{width:100%;padding:11px;background:#fff;color:#666;border:1.5px solid #ddd;border-radius:8px;font-size:14px;cursor:pointer;margin-top:10px;-webkit-appearance:none}
.hidden{display:none}

/* ファイル読み込みボタン：labelタグで確実にタップ反応させる */
.file-label{
  display:block;
  background:#185FA5;
  color:#fff;
  text-align:center;
  padding:16px;
  border-radius:10px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  line-height:1.5;
  -webkit-appearance:none;
}
.file-label:active{background:#0d4a82}
.file-label small{display:block;font-size:12px;font-weight:400;opacity:0.85;margin-top:4px}
#file-input{
  position:absolute;
  width:1px;height:1px;
  opacity:0;overflow:hidden;
}
.loaded-info{background:#e8f5e9;border-radius:8px;padding:10px 12px;margin-top:10px;font-size:13px;color:#2e7d32;font-weight:500;border:1px solid #4caf50}
.note{font-size:11px;color:#999;text-align:center;padding:10px 16px 14px;line-height:1.6}
</style>
</head>
<body>
<div class="screen">
  <div class="topbar">
    <h1>📋 資材3点照合アプリ</h1>
    <div class="subtitle">注文書 ・ 現物ラベル ・ 納品書</div>
  </div>

  <!-- ファイル読み込み -->
  <div class="sec">
    <div class="sec-label">📂 注文書ファイルを読み込む</div>
    <!-- inputをlabelで包んでスマホでも確実にタップ反応 -->
    <label class="file-label" for="file-input">
      ここをタップしてExcelを選ぶ
      <small>基幹から出力した注文書（.xlsx）を選択</small>
    </label>
    <input type="file" id="file-input" accept=".xlsx,.xls" onchange="loadFile(this)">
    <div id="loaded-info" class="loaded-info hidden"></div>
  </div>

  <!-- STEP1 注文書選択 -->
  <div class="sec">
    <div class="sec-label"><span class="step-badge">STEP 1</span>注文書を選ぶ</div>
    <select id="sel" onchange="onSelect()">
      <option value="">― ファイルを読み込むと表示されます ―</option>
    </select>
    <div id="ocard" class="order-card hidden">
      <div class="orow"><span class="ok">注文書No.</span><span class="ov" id="o-no"></span></div>
      <div class="orow"><span class="ok">資材コード</span><span class="ov" id="o-code"></span></div>
      <div class="orow"><span class="ok">資材名</span><span class="ov" id="o-name" style="font-size:12px"></span></div>
      <div class="orow"><span class="ok">注文数量</span><span class="ov qty-val" id="o-qty"></span></div>
    </div>
  </div>

  <!-- STEP2 現物 -->
  <div class="sec hidden" id="step2-sec">
    <div class="sec-label"><span class="step-badge">STEP 2</span>現物ラベルを確認</div>
    <div class="input-block">
      <div class="input-lbl">🏷 資材コード</div>
      <input type="text" id="lcode" placeholder="バーコード読取 または 手入力" oninput="clearRes()">
    </div>
    <div class="input-block">
      <div class="input-lbl">🏷 数量</div>
      <input type="number" id="lqty" placeholder="数量を入力" oninput="clearRes()">
    </div>
  </div>

  <!-- STEP3 納品書 -->
  <div class="sec hidden" id="step3-sec">
    <div class="sec-label"><span class="step-badge">STEP 3</span>納品書を確認</div>
    <div class="input-block">
      <div class="input-lbl">📄 資材コード</div>
      <input type="text" id="dcode" placeholder="バーコード読取 または 手入力" oninput="clearRes()">
    </div>
    <div class="input-block">
      <div class="input-lbl">📄 数量</div>
      <input type="number" id="dqty" placeholder="数量を入力" oninput="clearRes()">
    </div>
    <button class="check-btn" onclick="doCheck()">✅ 照合する</button>
  </div>

  <!-- 結果 -->
  <div class="sec hidden" id="res-sec">
    <div class="sec-label">照合結果</div>
    <div class="rcard" id="r1"><div class="rtitle" id="rt1"></div><div class="rdetail" id="rd1"></div></div>
    <div class="rcard" id="r2"><div class="rtitle" id="rt2"></div><div class="rdetail" id="rd2"></div></div>
    <div class="rcard" id="r3"><div class="rtitle" id="rt3"></div><div class="rdetail" id="rd3"></div></div>
    <div class="rcard" id="r4"><div class="rtitle" id="rt4"></div><div class="rdetail" id="rd4"></div></div>
    <div id="final"></div>
    <button class="reset-btn" onclick="resetAll()">🔄 次の照合へ</button>
  </div>

  <div class="note">
    このアプリはExcelファイルを読み込んで照合します<br>
    ファイルの内容は外部に送信されません
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
let orders = [];
let cur = null;

function loadFile(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array', cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

      orders = [];
      rows.forEach((row, i) => {
        if(i === 0) return;
        const a = String(row[0]||'').trim();
        const b = String(row[1]||'').trim();
        const ival = String(row[8]||'').trim();
        const p = String(row[15]||'').trim();
        if(!a || a==='品目名称' || a.includes('総合計')) return;
        const qty = parseInt(ival.replace(/,/g,'').replace(/\.000$/,'')) || 0;
        if(b && qty > 0) orders.push({no:a, code:b, name:p, qty:qty});
      });

      if(orders.length === 0){
        alert('注文データが見つかりませんでした。ファイルを確認してください。');
        return;
      }

      const sel = document.getElementById('sel');
      sel.innerHTML = '<option value="">― 注文書番号を選択してください ―</option>';
      orders.forEach((o,i)=>{
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = o.no + '　' + o.code + '　' + o.name.slice(0,12) + (o.name.length>12?'…':'');
        sel.appendChild(opt);
      });

      document.getElementById('loaded-info').textContent =
        '✅ ' + file.name + '　' + orders.length + '件 読み込み完了';
      document.getElementById('loaded-info').classList.remove('hidden');
      document.getElementById('ocard').classList.add('hidden');
      ['step2-sec','step3-sec','res-sec'].forEach(id=>document.getElementById(id).classList.add('hidden'));
      cur = null;
      sel.value = '';

    }catch(err){
      alert('読み込みエラー：' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function onSelect(){
  const v = document.getElementById('sel').value;
  document.getElementById('ocard').classList.add('hidden');
  ['step2-sec','step3-sec','res-sec'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  if(v===''){cur=null;return;}
  cur = orders[parseInt(v)];
  document.getElementById('o-no').textContent = cur.no;
  document.getElementById('o-code').textContent = cur.code;
  document.getElementById('o-name').textContent = cur.name;
  document.getElementById('o-qty').textContent = cur.qty.toLocaleString() + ' 個';
  document.getElementById('ocard').classList.remove('hidden');
  document.getElementById('step2-sec').classList.remove('hidden');
  document.getElementById('step3-sec').classList.remove('hidden');
  ['lcode','lqty','dcode','dqty'].forEach(id=>document.getElementById(id).value='');
}

function clearRes(){
  document.getElementById('res-sec').classList.add('hidden');
}

function setCard(id, rtId, rdId, ok, label, detail){
  document.getElementById(id).className = 'rcard ' + (ok?'rok':'rng');
  const rt = document.getElementById(rtId);
  rt.className = 'rtitle ' + (ok?'ok':'ng');
  rt.textContent = (ok?'✅ ':'❌ ') + label;
  document.getElementById(rdId).textContent = detail;
}

function doCheck(){
  if(!cur) return;
  const lc = document.getElementById('lcode').value.trim();
  const lq = parseInt(document.getElementById('lqty').value) || 0;
  const dc = document.getElementById('dcode').value.trim();
  const dq = parseInt(document.getElementById('dqty').value) || 0;

  const c1 = lc === cur.code;
  const c2 = dc === cur.code;
  const c3 = lq === cur.qty;
  const c4 = dq === cur.qty;

  setCard('r1','rt1','rd1', c1, '資材コード（注文書 ↔ 現物）',
    c1 ? '一致：' + cur.code : '注文書: ' + cur.code + '　現物: ' + (lc||'未入力'));
  setCard('r2','rt2','rd2', c2, '資材コード（注文書 ↔ 納品書）',
    c2 ? '一致：' + cur.code : '注文書: ' + cur.code + '　納品書: ' + (dc||'未入力'));
  setCard('r3','rt3','rd3', c3, '数量（注文書 ↔ 現物）',
    c3 ? '一致：' + cur.qty.toLocaleString() + '個'
       : '注文書: ' + cur.qty.toLocaleString() + '　現物: ' + lq.toLocaleString());
  setCard('r4','rt4','rd4', c4, '数量（注文書 ↔ 納品書）',
    c4 ? '一致：' + cur.qty.toLocaleString() + '個'
       : '注文書: ' + cur.qty.toLocaleString() + '　納品書: ' + dq.toLocaleString());

  const allOk = c1&&c2&&c3&&c4;
  document.getElementById('final').innerHTML = allOk
    ? '<div class="final-ok"><div class="icon-big">✅</div><div class="ft-ok">3点照合　OK</div><div class="fs-ok">すべて一致しました</div></div>'
    : '<div class="final-ng"><div class="icon-big">⚠️</div><div class="ft-ng">不一致あり　要確認</div><div class="fs-ng">赤い項目を担当者へ報告してください</div></div>';

  document.getElementById('res-sec').classList.remove('hidden');
  document.getElementById('res-sec').scrollIntoView({behavior:'smooth'});
}

function resetAll(){
  document.getElementById('sel').value='';
  document.getElementById('ocard').classList.add('hidden');
  ['step2-sec','step3-sec','res-sec'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  cur=null;
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
